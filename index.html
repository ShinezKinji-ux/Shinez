<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shinez Kinji</title>
<meta name="description" content="Shinez Kinji — caught between Shine and Zero." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --void:#0a0405;
    --shine:#f3e6e6;
    --spark:#c41818;
    --card:#1a0a0a;
    --dim:#6e2424;
    --line:rgba(196,24,24,0.18);
    --ease:cubic-bezier(.22,1,.36,1);
    --glow-strong: rgba(196,24,24,0.45);
    --glow-soft: rgba(196,24,24,0.15);
  }

  /* SHINE ZONE — angelic / light mode */
  body.theme-zone{
    --void:#fffdf6;
    --shine:#241a05;
    --spark:#d4a017;
    --card:#fff8e8;
    --dim:#a9883f;
    --line:rgba(212,160,23,0.20);
    --glow-strong: rgba(255,223,128,0.55);
    --glow-soft: rgba(255,223,128,0.22);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--shine);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    cursor:default;
    transition:background .8s var(--ease), color .8s var(--ease);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  ::selection{background:var(--spark);color:var(--void);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  .landing{
    position:relative;
    text-align:center;
    z-index:2;
    padding:2rem;
    max-width:600px;
  }

  .field{
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 30%, var(--glow-soft), transparent 65%);
    pointer-events:none;
    transition:background .8s var(--ease);
  }

  .particles{
    position:fixed;
    inset:0;
    pointer-events:none;
  }

  .particle{
    position:absolute;
    width:64px;height:64px;
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0;
    animation:sword-glitch var(--dur) steps(1,end) infinite;
    animation-delay:var(--delay);
  }
  .particle .flash{
    content:'';
    position:absolute;
    inset:0;
    background-image:inherit;
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0;
    animation:emblem-flash var(--dur) steps(1,end) infinite;
    animation-delay:var(--delay);
  }
  .particle::before, .particle::after{
    content:'';
    position:absolute;
    inset:0;
    background-image:inherit;
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    mix-blend-mode:screen;
    opacity:0;
    animation:sword-rgb-split var(--dur) steps(1,end) infinite;
    animation-delay:var(--delay);
  }
  .particle::before{ filter:invert(1) hue-rotate(180deg) saturate(8); transform:translateX(-2px); }
  .particle::after{ filter:hue-rotate(60deg) saturate(6); transform:translateX(2px); }

  .particle{
    background-image:url("fire-emblem.png");
    filter:drop-shadow(0 0 6px rgba(196,24,24,0.65));
  }
  .particle .flash{
    filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.9));
  }

  body.theme-zone .particle{
    background-image:url("light-emblem.png");
    filter:drop-shadow(0 0 6px rgba(212,160,23,0.75));
  }
  body.theme-zone .particle .flash{
    filter:brightness(0) drop-shadow(0 0 8px rgba(0,0,0,0.9));
  }

  @keyframes sword-glitch{
    0%{ opacity:0; transform:translate(0,0) scale(1); }
    2%{ opacity:var(--peak); transform:translate(-12px,4px) scale(0.94); }
    4%{ opacity:0; transform:translate(9px,-7px) scale(1.05); }
    6%{ opacity:var(--peak); transform:translate(7px,0) scale(0.97); }
    8%{ opacity:0.1; transform:translate(-10px,6px) scale(1.03); }
    10%{ opacity:var(--peak); transform:translate(0,-4px) scale(1); }
    12%{ opacity:var(--peak); transform:translate(-4px,0) scale(0.98); }
    14%{ opacity:0.2; transform:translate(6px,3px) scale(1.02); }
    16%,60%{ opacity:var(--peak); transform:translate(0,0) scale(1); }
    63%{ opacity:0.15; transform:translate(7px,0) scale(1.04); }
    65%{ opacity:var(--peak); transform:translate(0,0) scale(1); }
    80%{ opacity:var(--peak); transform:translate(0,0) scale(1); }
    82%{ opacity:0.1; transform:translate(-9px,3px) scale(1.05); }
    84%{ opacity:var(--peak); transform:translate(6px,-4px) scale(0.96); }
    86%{ opacity:0; transform:translate(-7px,6px) scale(1.03); }
    88%{ opacity:var(--peak); transform:translate(3px,0) scale(0.99); }
    90%{ opacity:0.05; transform:translate(-6px,-3px) scale(1.04); }
    92%{ opacity:var(--peak); transform:translate(0,3px) scale(1); }
    94%{ opacity:0; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(0,0) scale(1); }
  }

  @keyframes emblem-flash{
    0%,1%{ opacity:0; }
    2%{ opacity:0.95; }
    3%,7%{ opacity:0; }
    8%{ opacity:0.85; }
    9%,83%{ opacity:0; }
    84%{ opacity:0.9; }
    85%,89%{ opacity:0; }
    90%{ opacity:0.8; }
    91%,100%{ opacity:0; }
  }

  @keyframes sword-rgb-split{
    0%{ opacity:0; transform:translateX(0); }
    2%{ opacity:0.7; transform:translateX(-7px); }
    4%{ opacity:0; transform:translateX(6px); }
    6%{ opacity:0.55; transform:translateX(-5px); }
    8%{ opacity:0; transform:translateX(5px); }
    10%{ opacity:0.5; transform:translateX(-4px); }
    14%{ opacity:0; transform:translateX(0); }
    16%,60%{ opacity:0; transform:translateX(0); }
    63%{ opacity:0.45; transform:translateX(5px); }
    65%{ opacity:0; transform:translateX(0); }
    82%{ opacity:0.55; transform:translateX(-6px); }
    86%{ opacity:0; transform:translateX(5px); }
    88%{ opacity:0.45; transform:translateX(-4px); }
    92%{ opacity:0; transform:translateX(0); }
    100%{ opacity:0; transform:translateX(0); }
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:1.6rem;
    opacity:0;
    animation:rise .9s var(--ease) forwards;
    animation-delay:.2s;
  }

  .title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(3.6rem, 15vw, 10rem);
    line-height:0.92;
    letter-spacing:-0.02em;
    display:inline-block;
    color:var(--spark);
    text-shadow:0 0 50px var(--glow-strong), 0 0 110px var(--glow-soft);
    position:relative;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  body:not(.theme-zone) .title{
    animation:demon-flicker 4.5s ease-in-out infinite;
    animation-delay:2s;
  }
  @keyframes demon-flicker{
    0%,92%,100%{ text-shadow:0 0 50px var(--glow-strong), 0 0 110px var(--glow-soft); }
    94%{ text-shadow:0 0 18px var(--glow-strong), 0 0 40px var(--glow-soft); }
    96%{ text-shadow:0 0 70px var(--glow-strong), 0 0 150px var(--glow-soft); }
  }

  body.theme-zone .title{
    animation:angel-pulse 3.2s ease-in-out infinite;
    animation-delay:1.4s;
  }
  @keyframes angel-pulse{
    0%,100%{ text-shadow:0 0 50px var(--glow-strong), 0 0 110px var(--glow-soft); }
    50%{ text-shadow:0 0 70px var(--glow-strong), 0 0 160px var(--glow-soft); }
  }

  .tagline{
    margin-top:1.5rem;
    font-size:clamp(0.95rem, 2vw, 1.15rem);
    color:var(--shine);
    opacity:0;
    max-width:32ch;
    margin-inline:auto;
    line-height:1.6;
    animation:rise 1s var(--ease) forwards;
    animation-delay:.8s;
  }
  .tagline .accent{color:var(--spark);}

  .who-btn{
    display:inline-block;
    margin-top:3rem;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:1rem;
    letter-spacing:0.08em;
    padding:1.2rem 3rem;
    background:transparent;
    color:var(--shine);
    cursor:pointer;
    border:1.5px solid var(--spark);
    border-radius:999px;
    position:relative;
    overflow:hidden;
    opacity:0;
    animation:rise 1s var(--ease) forwards;
    animation-delay:1.2s;
    transition:transform .35s var(--ease), box-shadow .35s var(--ease);
    text-decoration:none;
  }
  .who-btn::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, var(--glow-soft), transparent);
    opacity:0;
    transition:opacity .4s var(--ease);
  }
  .who-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px var(--glow-soft);
  }
  .who-btn:hover::before{
    opacity:1;
  }
  .who-btn span{position:relative;z-index:2;}
  .who-btn:active{transform:translateY(0);}

  .theme-toggle{
    position:fixed;
    bottom:1.5rem;
    right:1.5rem;
    z-index:100;
    display:flex;
    gap:0.6rem;
    opacity:0;
    animation:rise 1s var(--ease) forwards;
    animation-delay:1.5s;
  }
  .theme-dot{
    width:10px;height:10px;
    border-radius:50%;
    cursor:pointer;
    border:1.5px solid transparent;
    transition:transform .3s var(--ease), border-color .3s var(--ease);
  }
  .theme-dot:hover{transform:scale(1.3);}
  .theme-dot.zero{
    background:#c41818;
    border-color:rgba(196,24,24,0.5);
  }
  .theme-dot.zone{
    background:#d4a017;
    border-color:rgba(212,160,23,0.5);
  }
  .theme-dot.is-active{
    box-shadow:0 0 10px currentColor;
    transform:scale(1.2);
  }

  .footer-hint{
    position:fixed;
    bottom:1.5rem;
    left:1.5rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;
    letter-spacing:0.1em;
    color:var(--dim);
    opacity:0;
    animation:rise 1s var(--ease) forwards;
    animation-delay:1.8s;
  }
</style>
</head>
<body>

<div class="field"></div>
<div class="particles" id="particles"></div>

<div class="landing">
  <div class="eyebrow">a name with two ends</div>
  <h1 class="title">SHINEZ</h1>
  <p class="tagline">
    I am <span class="accent">Shinez Kinji</span> — caught between
    <span class="accent">light</span> and <span class="accent">void</span>.
  </p>
  <a href="main.html" class="who-btn" id="whoBtn">
    <span>WHO I AM</span>
  </a>
</div>

<div class="theme-toggle" id="themeToggle">
  <div class="theme-dot zero is-active" data-theme="zero" title="Shine Zero"></div>
  <div class="theme-dot zone" data-theme="zone" title="Shine Zone"></div>
</div>

<div class="footer-hint">SHINEZ.KINJI</div>

<script>
  const THEME_KEY = 'shinez-theme';
  const body = document.body;
  const dots = document.querySelectorAll('.theme-dot');

  function applyTheme(theme){
    const isZone = theme === 'zone';
    body.classList.toggle('theme-zone', isZone);
    dots.forEach(d => d.classList.toggle('is-active', d.dataset.theme === theme));
    try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  }

  dots.forEach(dot => {
    dot.addEventListener('click', () => applyTheme(dot.dataset.theme));
  });

  (function init(){
    let saved = null;
    try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
    applyTheme(saved || 'zero');
  })();

  /* particles */
  const particlesEl = document.getElementById('particles');
  const PARTICLE_COUNT = 9;

  function randomizePosition(el){
    const x = 5 + Math.random()*90;
    const y = 5 + Math.random()*85;
    el.style.left = x+'%';
    el.style.top = y+'%';
  }

  for(let i=0;i<PARTICLE_COUNT;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    randomizePosition(p);
    const dur = (3.4 + Math.random()*2.2).toFixed(2)+'s';
    const delay = (Math.random()*6).toFixed(2)+'s';
    const peak = (0.5 + Math.random()*0.45).toFixed(2);
    p.style.setProperty('--dur', dur);
    p.style.setProperty('--delay', delay);
    p.style.setProperty('--peak', peak);
    const flash = document.createElement('span');
    flash.className = 'flash';
    p.appendChild(flash);
    p.addEventListener('animationiteration', ()=> randomizePosition(p));
    particlesEl.appendChild(p);
  }
</script>

</body>
</html>
