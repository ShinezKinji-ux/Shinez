<!
  /* ---------- FLOATING ORBS ---------- */
  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    pointer-events:none;
    z-index:0;
    opacity:0.35;
    animation:orb-drift 20s ease-in-out infinite;
    transition:opacity .6s var(--ease);
  }
  .orb-1{
    width:300px;height:300px;
    background:var(--glow-strong);
    top:10%;left:10%;
    animation-delay:0s;
  }
  .orb-2{
    width:200px;height:200px;
    background:var(--dim);
    bottom:20%;right:15%;
    animation-delay:-7s;
    opacity:0.2;
  }
  .orb-3{
    width:150px;height:150px;
    background:var(--spark);
    top:50%;left:70%;
    animation-delay:-14s;
    opacity:0.15;
  }
  @keyframes orb-drift{
    0%,100%{ transform:translate(0,0) scale(1); }
    25%{ transform:translate(30px,-20px) scale(1.1); }
    50%{ transform:translate(-20px,30px) scale(0.9); }
    75%{ transform:translate(20px,20px) scale(1.05); }
  }
DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shinez Kinji</title>
<meta name="description" content="Shinez Kinji — the threshold between two worlds." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --void:#050202;
    --shine:#e8d5d5;
    --spark:#ff2a2a;
    --dim:#8a2222;
    --line:rgba(255,42,42,0.12);
    --glow-strong: rgba(255,42,42,0.5);
    --glow-soft: rgba(255,42,42,0.08);
    --ease:cubic-bezier(.22,1,.36,1);
  }

  body.theme-zone{
    --void:#0a0800;
    --shine:#f0e6c8;
    --spark:#ffd700;
    --dim:#b8942a;
    --line:rgba(255,215,0,0.12);
    --glow-strong: rgba(255,215,0,0.5);
    --glow-soft: rgba(255,215,0,0.08);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--shine);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    cursor:default;
    transition:background 1.2s var(--ease), color 1.2s var(--ease);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  ::selection{background:var(--spark);color:var(--void);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- SCANLINES & NOISE ---------- */
  .scanlines{
    position:fixed;
    inset:0;
    z-index:9998;
    pointer-events:none;
    background:repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    opacity:0.6;
  }
  body.theme-zone .scanlines{
    background:repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.02) 2px,
      rgba(255,255,255,0.02) 4px
    );
  }

  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(ellipse 60% 50% at 50% 50%, transparent 30%, var(--void) 85%);
    transition:background 1.2s var(--ease);
  }

  /* ---------- PARTICLES ---------- */
  .particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .particle{
    position:absolute;
    width:3px;height:3px;
    background:var(--spark);
    border-radius:50%;
    opacity:0;
    animation:ember-float var(--dur) ease-in-out infinite;
    animation-delay:var(--delay);
    box-shadow:0 0 6px var(--spark);
  }
  body.theme-zone .particle{
    box-shadow:0 0 8px var(--spark), 0 0 16px var(--spark);
  }
  @keyframes ember-float{
    0%{ opacity:0; transform:translateY(0) scale(0); }
    10%{ opacity:var(--peak); transform:translateY(-20px) scale(1); }
    50%{ opacity:var(--mid); transform:translateY(-100px) scale(0.8); }
    90%{ opacity:var(--peak); transform:translateY(-180px) scale(1); }
    100%{ opacity:0; transform:translateY(-200px) scale(0); }
  }

  /* ---------- GLITCH TEXT ---------- */
  .glitch-text{
    position:relative;
    display:inline-block;
  }
  .glitch-text::before,
  .glitch-text::after{
    content:attr(data-text);
    position:absolute;
    top:0;left:0;width:100%;height:100%;
    opacity:0;
  }
  .glitch-text::before{
    color:var(--spark);
    animation:glitch-1 3s infinite linear alternate-reverse;
  }
  .glitch-text::after{
    color:var(--dim);
    animation:glitch-2 2.5s infinite linear alternate-reverse;
  }
  @keyframes glitch-1{
    0%,90%,100%{ opacity:0; transform:translate(0); clip-path:inset(0 0 100% 0); color:#ff2a2a; }
    92%{ opacity:0.8; transform:translate(-3px,1px); clip-path:inset(10% 0 60% 0); color:#ff2a2a; }
    94%{ opacity:0; transform:translate(0); clip-path:inset(0 0 100% 0); color:#ffd700; }
    96%{ opacity:0.6; transform:translate(2px,-1px); clip-path:inset(40% 0 20% 0); color:#ffd700; }
    98%{ opacity:0; transform:translate(0); clip-path:inset(0 0 100% 0); color:#ff2a2a; }
  }
  @keyframes glitch-2{
    0%,85%,100%{ opacity:0; transform:translate(0); clip-path:inset(100% 0 0 0); }
    87%{ opacity:0.7; transform:translate(3px,-1px); clip-path:inset(60% 0 10% 0); }
    89%{ opacity:0; transform:translate(0); clip-path:inset(100% 0 0 0); }
    91%{ opacity:0.5; transform:translate(-2px,1px); clip-path:inset(20% 0 50% 0); }
    93%{ opacity:0; transform:translate(0); clip-path:inset(100% 0 0 0); }
  }

  /* ---------- LANDING CONTENT ---------- */
  .landing{
    position:relative;
    text-align:center;
    z-index:10;
    padding:2rem;
    max-width:700px;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;
    letter-spacing:0.4em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:2rem;
    opacity:0;
    animation:fade-up 1.2s var(--ease) forwards;
    animation-delay:0.3s;
  }

  .title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(4rem, 18vw, 12rem);
    line-height:0.85;
    letter-spacing:-0.03em;
    color:var(--shine);
    opacity:0;
    animation:fade-up 1.4s var(--ease) forwards, title-breathe 4s ease-in-out infinite;
    animation-delay:0.6s, 2s;
    position:relative;
  }
  .title span{
    display:inline-block;
    color:var(--spark);
    text-shadow:0 0 60px var(--glow-strong), 0 0 140px var(--glow-soft);
    animation:color-cycle 4.6s steps(1,end) infinite;
  }
  @keyframes color-cycle{
    0%,49%{ color:#ff2a2a; text-shadow:0 0 60px rgba(255,42,42,0.5), 0 0 140px rgba(255,42,42,0.08); }
    50%,100%{ color:#ffd700; text-shadow:0 0 60px rgba(255,215,0,0.5), 0 0 140px rgba(255,215,0,0.08); }
  }
  @keyframes fade-up{
    from{ opacity:0; transform:translateY(30px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes title-breathe{
    0%,100%{ text-shadow:0 0 60px var(--glow-strong), 0 0 140px var(--glow-soft); }
    50%{ text-shadow:0 0 80px var(--glow-strong), 0 0 180px var(--glow-soft); }
  }

  .divider{
    width:60px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--spark), transparent);
    margin:2.5rem auto;
    opacity:0;
    animation:expand 1.5s var(--ease) forwards;
    animation-delay:1s;
  }
  @keyframes expand{
    from{ opacity:0; width:0; }
    to{ opacity:1; width:60px; }
  }

  .tagline{
    font-size:clamp(0.9rem, 2.2vw, 1.1rem);
    color:var(--shine);
    opacity:0.7;
    max-width:36ch;
    margin-inline:auto;
    line-height:1.7;
    opacity:0;
    animation:fade-up 1.2s var(--ease) forwards;
    animation-delay:1.3s;
  }
  .tagline .accent{color:var(--spark); font-weight:500;}

  /* ---------- WHO I AM BUTTON ---------- */
  .who-btn-wrap{
    margin-top:3.5rem;
    opacity:0;
    animation:fade-up 1.2s var(--ease) forwards;
    animation-delay:1.8s;
    position:relative;
    display:inline-block;
  }

  .who-btn{
    display:inline-flex;
    align-items:center;
    gap:0.8rem;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    padding:1.3rem 3.5rem;
    background:transparent;
    color:var(--shine);
    cursor:pointer;
    border:1.5px solid var(--line);
    border-radius:4px;
    position:relative;
    overflow:hidden;
    text-decoration:none;
    transition:border-color 0.5s var(--ease), transform 0.4s var(--ease), box-shadow 0.5s var(--ease);
    clip-path:polygon(0% 0%, 100% 0%, 100% 85%, 95% 100%, 0% 100%);
  }
  .who-btn::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, var(--glow-soft), transparent 60%);
    opacity:0;
    transition:opacity 0.6s var(--ease);
  }
  .who-btn::after{
    content:'';
    position:absolute;
    bottom:0;left:0;
    width:100%;height:2px;
    background:linear-gradient(90deg, transparent, var(--spark), transparent);
    transform:scaleX(0);
    transform-origin:center;
    transition:transform 0.6s var(--ease);
  }
  .who-btn:hover{
    border-color:var(--spark);
    transform:translateY(-2px);
    box-shadow:0 10px 40px var(--glow-soft), 0 0 60px var(--glow-soft);
  }
  .who-btn:hover::before{ opacity:1; }
  .who-btn:hover::after{ transform:scaleX(1); }
  .who-btn span{position:relative;z-index:2;}
  .who-btn:active{ transform:translateY(0); }

  /* arrow animation */
  .who-btn .arrow{
    display:inline-block;
    transition:transform 0.4s var(--ease);
  }
  .who-btn:hover .arrow{
    transform:translateX(4px);
    animation:arrow-pulse 1.5s ease-in-out infinite;
  }
  @keyframes arrow-pulse{
    0%,100%{ transform:translateX(4px); opacity:1; }
    50%{ transform:translateX(8px); opacity:0.6; }
  }

  /* corner accents */
  .who-btn-wrap .corner{
    position:absolute;
    width:8px;height:8px;
    border:1.5px solid var(--spark);
    opacity:0;
    transition:opacity 0.4s var(--ease), transform 0.4s var(--ease);
    pointer-events:none;
  }
  .who-btn-wrap .corner.tl{ top:-4px; left:-4px; border-right:none; border-bottom:none; }
  .who-btn-wrap .corner.tr{ top:-4px; right:-4px; border-left:none; border-bottom:none; }
  .who-btn-wrap .corner.bl{ bottom:-4px; left:-4px; border-right:none; border-top:none; }
  .who-btn-wrap .corner.br{ bottom:-4px; right:-4px; border-left:none; border-top:none; }
  .who-btn-wrap:hover .corner{ opacity:1; }
  .who-btn-wrap:hover .corner.tl{ transform:translate(-2px,-2px); }
  .who-btn-wrap:hover .corner.tr{ transform:translate(2px,-2px); }
  .who-btn-wrap:hover .corner.bl{ transform:translate(-2px,2px); }
  .who-btn-wrap:hover .corner.br{ transform:translate(2px,2px); }

  /* ---------- THEME TOGGLE ---------- */
  .theme-toggle{
    position:fixed;
    bottom:2rem;
    right:2rem;
    z-index:100;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.8rem;
    opacity:0;
    animation:fade-up 1s var(--ease) forwards;
    animation-delay:2.2s;
  }
  .theme-label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.55rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--dim);
    writing-mode:vertical-rl;
    text-orientation:mixed;
    margin-bottom:0.3rem;
  }
  .theme-dots{
    display:flex;
    flex-direction:column;
    gap:0.6rem;
    align-items:center;
  }
  .theme-dot{
    width:10px;height:10px;
    border-radius:50%;
    cursor:pointer;
    border:1.5px solid transparent;
    transition:transform 0.4s var(--ease), border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);
    position:relative;
  }
  .theme-dot::after{
    content:'';
    position:absolute;
    inset:-4px;
    border-radius:50%;
    border:1px solid transparent;
    transition:border-color 0.4s var(--ease), opacity 0.4s var(--ease);
    opacity:0;
  }
  .theme-dot.zero{
    background:#ff2a2a;
    border-color:rgba(255,42,42,0.4);
  }
  .theme-dot.zero::after{ border-color:rgba(255,42,42,0.3); }
  .theme-dot.zone{
    background:#ffd700;
    border-color:rgba(255,215,0,0.4);
  }
  .theme-dot.zone::after{ border-color:rgba(255,215,0,0.3); }
  .theme-dot:hover{ transform:scale(1.4); }
  .theme-dot.is-active{
    transform:scale(1.3);
    box-shadow:0 0 12px currentColor;
  }
  .theme-dot.is-active::after{ opacity:1; }

  /* ---------- FOOTER ---------- */
  .footer-hint{
    position:fixed;
    bottom:2rem;
    left:2rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.6rem;
    letter-spacing:0.15em;
    color:var(--dim);
    opacity:0;
    animation:fade-up 1s var(--ease) forwards;
    animation-delay:2.5s;
  }
  .footer-hint::before{
    content:'◆ ';
    color:var(--spark);
    animation:blink 2s ease-in-out infinite;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0.3; }
  }



  /* ---------- RESPONSIVE ---------- */
  @media (max-width:480px){
    .who-btn{ padding:1.1rem 2.5rem; font-size:0.8rem; }
    .theme-toggle{ bottom:1.2rem; right:1.2rem; }
    .footer-hint{ bottom:1.2rem; left:1.2rem; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="scanlines"></div>
<div class="vignette"></div>



<div class="particles" id="particles"></div>

<div class="landing">
  <div class="eyebrow">the threshold</div>

  <h1 class="title glitch-text" data-text="SHINEZ">
    SHINE<span>Z</span>
  </h1>

  <div class="divider"></div>

  <p class="tagline">
    A name split between <span class="accent">radiance</span> and <span class="accent">erasure</span>.
    Two natures. One person. Choose your lens.
  </p>

  <div class="who-btn-wrap">
    <a href="main.html" class="who-btn" id="whoBtn">
      <span>WHO I AM</span>
      <span class="arrow">→</span>
    </a>
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
  </div>
</div>

<div class="theme-toggle" id="themeToggle">
  <span class="theme-label">Lens</span>
  <div class="theme-dots">
    <div class="theme-dot zero is-active" data-theme="zero" title="Shine Zero"></div>
    <div class="theme-dot zone" data-theme="zone" title="Shine Zone"></div>
  </div>
</div>

<div class="footer-hint">SHINEZ.KINJI</div>

<script>
  const THEME_KEY = 'shinez-theme';
  const body = document.body;
  const dots = document.querySelectorAll('.theme-dot');

  function applyTheme(theme){
    const isZone = theme === 'zone';
    body.classList.toggle('theme-zone', isZone);
    dots.forEach(d => {
      d.classList.toggle('is-active', d.dataset.theme === theme);
    });
    try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  }

  dots.forEach(dot => {
    dot.addEventListener('click', () => applyTheme(dot.dataset.theme));
  });

  (function init(){
    let saved = null;
    try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
    applyTheme(saved || 'zero');
  })();

  /* floating ember particles */
  const particlesEl = document.getElementById('particles');
  const PARTICLE_COUNT = 25;

  for(let i=0; i<PARTICLE_COUNT; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random() * 100;
    const y = 80 + Math.random() * 20;
    p.style.left = x + '%';
    p.style.top = y + '%';
    const dur = (6 + Math.random() * 8).toFixed(2) + 's';
    const delay = (Math.random() * 10).toFixed(2) + 's';
    const peak = (0.4 + Math.random() * 0.4).toFixed(2);
    const mid = (0.15 + Math.random() * 0.2).toFixed(2);
    p.style.setProperty('--dur', dur);
    p.style.setProperty('--delay', delay);
    p.style.setProperty('--peak', peak);
    p.style.setProperty('--mid', mid);
    const size = 2 + Math.random() * 3;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    particlesEl.appendChild(p);
  }
</script>

</body>
</html>
